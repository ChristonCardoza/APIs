syntax = "proto3";

package sec06;

option java_multiple_files = true;
option java_package = "org.cardoza.models.sec06";

import "google/protobuf/empty.proto";

message BalanceCheckRequest {
  int32 account_number = 1;
}

message AccountBalance {
  int32 account_number = 1;
  int32 balance = 2;
}

message AllAccountResponse {
  repeated AccountBalance accounts = 1;
}

service BankService {
  // unary
  rpc GetAccountBalance(BalanceCheckRequest) returns (AccountBalance);
  rpc GetAllAccount(google.protobuf.Empty) returns (AllAccountResponse);
}